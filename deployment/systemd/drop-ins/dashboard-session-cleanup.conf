[Service]
Environment=AURORA_DASHBOARD_SESSION_HEARTBEAT_MS=0
ExecStart=
ExecStart=/opt/aurora-cloud-dashboard/venv/bin/panel serve app.py model-evaluation.py dart.py \
  --address=127.0.0.1 \
  --port=5006 \
  --allow-websocket-origin=data-ocean.gamb2le.co.uk \
  --allow-websocket-origin=data-ocean.gamb2le.co.uk:443 \
  --allow-websocket-origin=167.172.54.82 \
  --allow-websocket-origin=167.172.54.82:80 \
  --allow-websocket-origin=167.172.54.82:443 \
  --static-dirs wxcam-media=/data/aurora/products/wxcam auroracam-media=/project/aurora/raw/auroracam \
  --keep-alive=15000 \
  --check-unused-sessions=60000 \
  --unused-session-lifetime=600000 \
  --session-token-expiration=86400 \
  --num-procs=1
