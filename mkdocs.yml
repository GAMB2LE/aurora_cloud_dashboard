site_name: Aurora Cloud Dashboard
site_description: Panel dashboard and data-product scripts for the Aurora observing stack
repo_name: GAMB2LE/aurora_cloud_dashboard
repo_url: https://github.com/GAMB2LE/aurora_cloud_dashboard
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
