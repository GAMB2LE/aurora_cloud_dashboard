site_name: Aurora Cloud Dashboard
site_description: Panel dashboard and data-product scripts for the Aurora observing stack
repo_name: GAMB2LE/aurora_cloud_dashboard
repo_url: https://github.com/GAMB2LE/aurora_cloud_dashboard
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Overview:
      - Dashboard at a glance: overview/index.md
      - Tabs and views: overview/tabs-and-views.md
      - Core files: overview/core-files.md
  - Instruments:
      - Instrument summary: instruments/index.md
      - Ceilometer: instruments/ceilometer.md
      - Cloud Radar: instruments/cloud-radar.md
      - Scanning Microwave Radiometer: instruments/scanning-microwave-radiometer.md
      - Meteorology: instruments/meteorology.md
      - Radiation: instruments/radiation.md
      - Aurora Power Supply: instruments/aurora-power-supply.md
      - WXcam: instruments/wxcam.md
      - Operations Dashboard: instruments/operations-dashboard.md
  - Runtime and storage:
      - Deployed paths: runtime/deployed-paths.md
      - Storage layout: runtime/storage-layout.md
      - Services and timers: runtime/services-and-timers.md
      - Performance logging: runtime/performance-logging.md
      - Running locally: runtime/running-locally.md
      - Documentation publishing: runtime/documentation-publishing.md
      - Notes: runtime/notes.md
  - Data products:
      - Zarr and product overview: data-products/index.md
      - Ceilometer Zarr: data-products/ceilometer-zarr.md
      - Cloud Radar Zarr: data-products/cloud-radar-zarr.md
      - HATPRO Zarr: data-products/hatpro-zarr.md
      - Meteorology Zarr: data-products/meteorology-zarr.md
      - ASFS Logger Zarr: data-products/asfs-logger-zarr.md
      - ASFS Fast Sonic Zarr: data-products/asfs-fast-sonic-zarr.md
      - ASFS Fast Gas Zarr: data-products/asfs-fast-gas-zarr.md
      - Power Zarr: data-products/power-zarr.md
      - WXcam products: data-products/wxcam-products.md
      - WXcam Zarr: data-products/wxcam-zarr.md
      - Operations products: data-products/operations-products.md
