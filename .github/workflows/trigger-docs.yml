name: trigger-docs

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - mkdocs.yml
      - docs/**
      - .github/workflows/trigger-docs.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-portal:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: GAMB2LE

      - name: Trigger unified docs rebuild
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          response_file="$(mktemp)"
          status_code="$(
            curl --silent --show-error \
              -o "${response_file}" \
              -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/GAMB2LE/mkdocs-portal/actions/workflows/docs.yml/dispatches \
              -d '{"ref":"main"}'
          )"
          if [ "${status_code}" != "204" ]; then
            echo "Docs portal dispatch failed with HTTP ${status_code}" >&2
            cat "${response_file}" >&2
            exit 1
          fi
          echo "Docs portal dispatch accepted (HTTP 204)."
