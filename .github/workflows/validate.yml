name: validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dashboard.txt
      - name: Install dashboard dependencies
        run: python -m pip install -r requirements-dashboard.txt
      - name: Check patch formatting
        run: git log --check --oneline -n 20
      - name: Compile Python modules
        run: python -m compileall -q -x '/(venv|\.venv[^/]*)/' .
      - name: Run unit tests
        run: python -m unittest discover -p 'test_*.py'
      - name: Import dashboard
        run: python -c 'import app'

  documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt
      - name: Build documentation strictly
        run: python -m mkdocs build --strict
